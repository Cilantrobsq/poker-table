<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Heads-Up Texas Hold'em</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Error Toast -->
<div id="error-message"></div>

<!-- Lobby Screen -->
<div id="lobby-screen" class="screen">
  <div class="lobby-card">
    <div class="lobby-title">Texas Hold'em</div>
    <div class="lobby-subtitle">2-Player Heads-Up Poker</div>

    <div class="lobby-section">
      <h3>Your Name</h3>
      <input type="text" id="player-name" placeholder="Enter your name" maxlength="20" autocomplete="off">
    </div>

    <div class="lobby-section">
      <button class="btn btn-primary" id="btn-solo">Play Solo</button>
    </div>

    <div class="lobby-divider">or play with a friend</div>

    <div class="lobby-section">
      <button class="btn btn-secondary" id="btn-host">Host a Game</button>
    </div>

    <div class="lobby-section">
      <input type="text" id="room-code-input" placeholder="Enter room code" maxlength="6" autocomplete="off"
             style="text-transform:uppercase; letter-spacing:4px; text-align:center; margin-bottom:10px;">
      <button class="btn btn-secondary" id="btn-join">Join Game</button>
    </div>
  </div>
</div>

<!-- Connecting Screen -->
<div id="connecting-screen" class="screen" style="display:none; flex-direction:column; gap:20px; text-align:center;">
  <div style="font-size:1.1rem; color:rgba(255,255,255,0.7);" id="connecting-message">Waiting for opponent...</div>

  <div id="room-code-wrapper" style="display:none; flex-direction:column; align-items:center; gap:12px;">
    <div style="font-size:0.85rem; color:rgba(255,255,255,0.5);">Share this room code:</div>
    <div class="room-code-display" id="room-code-display">------</div>
    <button class="btn btn-sm btn-secondary" id="btn-copy-code" style="width:auto; padding:8px 20px;">Copy Code</button>
  </div>

  <div class="spinner" style="margin: 0 auto;"></div>

  <button class="btn btn-secondary" id="btn-cancel" style="width:auto; padding:10px 28px; margin:0 auto;">Cancel</button>
</div>

<!-- Game Screen -->
<div id="game-screen" class="screen" style="display:none; flex-direction:column;">

  <!-- Header -->
  <div class="game-header">
    <span class="game-header-title"><span id="connection-dot" class="conn-dot conn-green"></span> Texas Hold'em</span>
    <div id="status-message"></div>
    <div class="game-header-actions">
      <button class="btn btn-sm btn-secondary" id="btn-mute" title="Toggle sound">&#128266;</button>
      <button class="btn btn-sm btn-secondary" id="btn-new-game" style="display:none;">New Game</button>
      <button class="btn btn-sm btn-danger" id="btn-disconnect">Leave</button>
    </div>
  </div>

  <!-- Table Wrapper -->
  <div class="table-wrapper">
    <div class="poker-table">

      <!-- Opponent (top) -->
      <div class="player-area" id="player-opponent">
        <div class="player-cards" id="opp-cards"></div>
        <div class="player-info">
          <div class="player-name" id="opp-name">Opponent</div>
          <div class="player-chips" id="opp-chips">$1000</div>
          <div class="player-bet" id="opp-bet"></div>
          <div class="player-status" id="opp-status"></div>
        </div>
        <div class="dealer-btn" id="opp-dealer" style="display:none;">D</div>
      </div>

      <!-- Center: Community Cards + Pot -->
      <div class="table-center">
        <div class="phase-label" id="phase-label">Waiting...</div>
        <div class="community-row" id="community-cards"></div>
        <div class="pot-display">
          <span class="pot-label">Pot</span>
          <span id="pot-amount">$0</span>
        </div>
      </div>

      <!-- Local Player (bottom) -->
      <div class="player-area" id="player-local">
        <div class="player-cards" id="local-cards"></div>
        <div class="player-info">
          <div class="player-name" id="local-name">You</div>
          <div class="player-chips" id="local-chips">$1000</div>
          <div class="player-bet" id="local-bet"></div>
          <div class="player-status" id="local-status"></div>
        </div>
        <div class="dealer-btn" id="local-dealer" style="display:none;">D</div>
      </div>

      <!-- Showdown/Fold Overlay -->
      <div id="showdown-overlay">
        <div id="showdown-hands"></div>
        <div id="showdown-message"></div>
        <div id="showdown-pot-award"></div>
        <div class="showdown-actions">
          <button class="btn btn-primary" id="btn-next-hand" style="display:none;">Next Hand</button>
          <button class="btn btn-secondary" id="btn-restart" style="display:none;">New Game</button>
        </div>
      </div>

    </div>
  </div>

  <!-- Game Log -->
  <div class="game-log-wrapper">
    <div class="game-log-toggle" id="log-toggle">Log &#9660;</div>
    <div class="game-log" id="game-log"></div>
  </div>

  <!-- Betting Controls -->
  <div id="betting-controls" style="display:none;">
    <button class="btn" id="btn-fold">Fold</button>
    <button class="btn" id="btn-check-call" data-action="check">Check</button>
    <div class="raise-controls">
      <div class="bet-presets">
        <button class="btn btn-preset" id="btn-half-pot">1/2 Pot</button>
        <button class="btn btn-preset" id="btn-pot">Pot</button>
        <button class="btn btn-preset btn-allin-preset" id="btn-allin-preset">All In</button>
      </div>
      <input type="range" id="raise-slider" min="20" max="1000" value="40" step="10">
      <input type="number" id="raise-amount" min="20" max="1000" value="40" step="10">
    </div>
    <button class="btn" id="btn-raise">Raise</button>
    <button class="btn btn-allin" id="btn-allin">All In</button>
  </div>

</div>

<!-- Scripts -->
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="js/game.js"></script>
<script src="js/ui.js"></script>
<script src="js/peer.js"></script>
<script src="js/bot.js"></script>
<script>
(function () {
  'use strict';

  var game = null;
  var localPlayerIdx = -1;
  var isHost = false;
  var soloMode = false;
  var botPlayerIdx = 1;
  var pendingGuestName = null;
  var nextHandTimer = null;
  var countdownInterval = null;
  var gameState = null;
  var lastTurnPlayerIdx = -1; // track turns for notification
  var turnBannerEl = null;
  var botTurnTimer = null;

  // DOM refs
  var els = {
    playerName: document.getElementById('player-name'),
    roomCodeInput: document.getElementById('room-code-input'),
    btnSolo: document.getElementById('btn-solo'),
    btnHost: document.getElementById('btn-host'),
    btnJoin: document.getElementById('btn-join'),
    btnCancel: document.getElementById('btn-cancel'),
    btnCopyCode: document.getElementById('btn-copy-code'),
    roomCodeDisplay: document.getElementById('room-code-display'),
    roomCodeWrapper: document.getElementById('room-code-wrapper'),
    btnFold: document.getElementById('btn-fold'),
    btnCheckCall: document.getElementById('btn-check-call'),
    btnRaise: document.getElementById('btn-raise'),
    raiseSlider: document.getElementById('raise-slider'),
    raiseAmount: document.getElementById('raise-amount'),
    btnNextHand: document.getElementById('btn-next-hand'),
    btnRestart: document.getElementById('btn-restart'),
    btnDisconnect: document.getElementById('btn-disconnect'),
    btnNewGame: document.getElementById('btn-new-game'),
    bettingControls: document.getElementById('betting-controls'),
    btnMute: document.getElementById('btn-mute'),
    btnAllin: document.getElementById('btn-allin'),
    btnHalfPot: document.getElementById('btn-half-pot'),
    btnPot: document.getElementById('btn-pot'),
    btnAllinPreset: document.getElementById('btn-allin-preset'),
    logToggle: document.getElementById('log-toggle'),
    connectionDot: document.getElementById('connection-dot'),
  };

  // ── Turn Notification ──────────────────────────────────────────────────────
  function showTurnBanner() {
    if (turnBannerEl) {
      turnBannerEl.remove();
      turnBannerEl = null;
    }
    turnBannerEl = document.createElement('div');
    turnBannerEl.className = 'turn-banner';
    turnBannerEl.textContent = 'YOUR TURN';
    document.body.appendChild(turnBannerEl);
    // Vibrate on mobile if supported
    if (navigator.vibrate) {
      navigator.vibrate([100, 50, 100]);
    }
    setTimeout(function() {
      if (turnBannerEl) {
        turnBannerEl.remove();
        turnBannerEl = null;
      }
    }, 1600);
  }

  function checkTurnNotification(state) {
    var isMyTurn = state.currentPlayerIdx === localPlayerIdx;
    var phase = state.phase;
    var isBettingPhase = phase === 'preflop' || phase === 'flop' || phase === 'turn' || phase === 'river';

    if (isMyTurn && isBettingPhase && lastTurnPlayerIdx !== localPlayerIdx) {
      showTurnBanner();
      sfxTurn();
    }
    lastTurnPlayerIdx = state.currentPlayerIdx;
  }

  // ── Solo Mode ────────────────────────────────────────────────────────────
  els.btnSolo.addEventListener('click', function () {
    var name = (els.playerName.value || 'You').trim();
    if (!name) { UI.showError('Enter your name first'); return; }
    soloMode = true;
    isHost = true;
    localPlayerIdx = 0;
    botPlayerIdx = 1;

    game = new GameEngine();
    game.setPlayerNames(name, 'Bot');
    UI.showGame();
    els.bettingControls.style.display = 'flex';
    els.btnNewGame.style.display = 'inline-flex';
    lastTurnPlayerIdx = -1;
    game.startHand();
    sfxDeal();
    startConnectionMonitor();
    updateLocalView();
    scheduleBotTurnIfNeeded();
  });

  // ── Lobby Events ──────────────────────────────────────────────────────────
  els.btnHost.addEventListener('click', function () {
    var name = (els.playerName.value || 'Host').trim();
    if (!name) { UI.showError('Enter your name first'); return; }
    isHost = true;
    localPlayerIdx = 0;

    UI.showConnecting('Waiting for opponent to join...');
    els.roomCodeWrapper.style.display = 'flex';

    Network.hostGame(name, {
      onRoomCodeReady: function (code) {
        els.roomCodeDisplay.textContent = code;
      },
      onConnected: function (idx) {
        UI.showStatus('Opponent connected! Starting game...');
      },
      onMessage: handleNetworkMessage,
      onDisconnected: handleDisconnect,
      onError: function (msg) { UI.showError(msg); }
    });
  });

  els.btnJoin.addEventListener('click', function () {
    var name = (els.playerName.value || 'Guest').trim();
    var code = els.roomCodeInput.value.toUpperCase().trim();
    if (!name) { UI.showError('Enter your name first'); return; }
    if (code.length < 6) { UI.showError('Enter a 6-character room code'); return; }
    isHost = false;
    localPlayerIdx = 1;

    UI.showConnecting('Connecting to game...');

    Network.joinGame(code, name, {
      onConnected: function (idx) {
        UI.showStatus('Connected! Waiting for host to start...');
        Network.sendMessage({ type: 'name', name: name, playerIdx: 1 });
      },
      onMessage: handleNetworkMessage,
      onDisconnected: handleDisconnect,
      onError: function (msg) { UI.showError(msg); }
    });
  });

  els.btnCancel.addEventListener('click', function () {
    Network.disconnect();
    UI.showLobby();
  });

  els.btnCopyCode.addEventListener('click', function () {
    var code = els.roomCodeDisplay.textContent;
    navigator.clipboard.writeText(code).then(function () {
      els.btnCopyCode.textContent = 'Copied!';
      setTimeout(function () { els.btnCopyCode.textContent = 'Copy Code'; }, 2000);
    }).catch(function () {
      els.btnCopyCode.textContent = code;
    });
  });

  els.btnDisconnect.addEventListener('click', function () {
    if (confirm('Leave the game?')) {
      if (botTurnTimer) { clearTimeout(botTurnTimer); botTurnTimer = null; }
      if (!soloMode) Network.disconnect();
      game = null;
      soloMode = false;
      UI.showLobby();
    }
  });

  // ── Raise Controls Sync ─────────────────────────────────────────────────
  els.raiseSlider.addEventListener('input', function () {
    els.raiseAmount.value = this.value;
    updateRaiseButton();
  });
  els.raiseAmount.addEventListener('input', function () {
    var v = parseInt(this.value) || 0;
    v = Math.max(parseInt(els.raiseSlider.min), Math.min(parseInt(els.raiseSlider.max), v));
    els.raiseSlider.value = v;
    this.value = v;
    updateRaiseButton();
  });
  function updateRaiseButton() {
    var btn = document.getElementById('btn-raise');
    if (btn) btn.textContent = 'Raise to $' + (els.raiseAmount.value || els.raiseSlider.value);
  }

  // ── Bet Presets ─────────────────────────────────────────────────────────
  els.btnHalfPot.addEventListener('click', function () {
    var st = getCurrentState();
    if (!st) return;
    var halfPot = Math.max(Math.floor(st.pot / 2), parseInt(els.raiseSlider.min) || 20);
    halfPot = Math.min(halfPot, parseInt(els.raiseSlider.max));
    els.raiseSlider.value = halfPot;
    els.raiseAmount.value = halfPot;
    updateRaiseButton();
  });
  els.btnPot.addEventListener('click', function () {
    var st = getCurrentState();
    if (!st) return;
    var potVal = Math.max(st.pot, parseInt(els.raiseSlider.min) || 20);
    potVal = Math.min(potVal, parseInt(els.raiseSlider.max));
    els.raiseSlider.value = potVal;
    els.raiseAmount.value = potVal;
    updateRaiseButton();
  });
  els.btnAllinPreset.addEventListener('click', function () {
    var maxVal = parseInt(els.raiseSlider.max);
    els.raiseSlider.value = maxVal;
    els.raiseAmount.value = maxVal;
    updateRaiseButton();
  });

  function getCurrentState() {
    if (isHost && game) return game.getState(localPlayerIdx);
    return gameState;
  }

  // ── All In Button ──────────────────────────────────────────────────────
  els.btnAllin.addEventListener('click', function () {
    var st = getCurrentState();
    if (!st) return;
    var localPlayer = st.players[localPlayerIdx];
    var allInAmount = localPlayer.chips + localPlayer.bet;
    submitAction('raise', allInAmount);
  });

  // ── Log Toggle ─────────────────────────────────────────────────────────
  els.logToggle.addEventListener('click', function () {
    var logEl = document.getElementById('game-log');
    var wrapper = logEl.parentElement;
    wrapper.classList.toggle('log-collapsed');
    els.logToggle.innerHTML = wrapper.classList.contains('log-collapsed') ? 'Log &#9650;' : 'Log &#9660;';
  });

  // ── Mute Toggle ────────────────────────────────────────────────────────
  var soundMuted = false;
  els.btnMute.addEventListener('click', function () {
    soundMuted = !soundMuted;
    els.btnMute.innerHTML = soundMuted ? '&#128263;' : '&#128266;';
    els.btnMute.title = soundMuted ? 'Unmute sound' : 'Mute sound';
  });

  // ── Sound Effects ──────────────────────────────────────────────────────
  var audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }
    return audioCtx;
  }
  function playTone(freq, duration, type, vol) {
    if (soundMuted) return;
    var ctx = getAudioCtx();
    if (!ctx) return;
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.value = vol || 0.08;
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  }
  function sfxDeal() { playTone(800, 0.06, 'square', 0.05); }
  function sfxChip() { playTone(2200, 0.08, 'sine', 0.06); }
  function sfxWin() {
    playTone(523, 0.15, 'sine', 0.07);
    setTimeout(function(){ playTone(659, 0.15, 'sine', 0.07); }, 120);
    setTimeout(function(){ playTone(784, 0.25, 'sine', 0.07); }, 240);
  }
  function sfxFold() {
    playTone(330, 0.15, 'sine', 0.06);
    setTimeout(function(){ playTone(220, 0.2, 'sine', 0.05); }, 100);
  }
  function sfxTurn() {
    playTone(660, 0.1, 'sine', 0.06);
    setTimeout(function(){ playTone(880, 0.12, 'sine', 0.06); }, 80);
  }

  // ── Connection Health Indicator ────────────────────────────────────────
  var connCheckInterval = null;
  function startConnectionMonitor() {
    if (connCheckInterval) clearInterval(connCheckInterval);
    connCheckInterval = setInterval(function () {
      var dot = els.connectionDot;
      if (!dot) return;
      dot.className = (soloMode || Network.isConnected()) ? 'conn-dot conn-green' : 'conn-dot conn-red';
    }, 2000);
  }

  // ── Betting Action Events ──────────────────────────────────────────────
  els.btnFold.addEventListener('click', function () { sfxFold(); submitAction('fold'); });
  els.btnCheckCall.addEventListener('click', function () {
    var action = this.dataset.action || 'check';
    if (action === 'call') sfxChip();
    submitAction(action);
  });
  els.btnRaise.addEventListener('click', function () {
    var amount = parseInt(els.raiseAmount.value);
    if (isNaN(amount) || amount <= 0) amount = parseInt(els.raiseSlider.value);
    if (isNaN(amount) || amount <= 0) amount = parseInt(els.raiseSlider.min) || 40;
    sfxChip();
    submitAction('raise', amount);
  });

  function submitAction(action, amount) {
    if (!soloMode && !Network.isConnected()) {
      UI.showError('Not connected to opponent');
      return;
    }

    if (soloMode) {
      var result = game.placeBet(localPlayerIdx, action, amount);
      if (result && result.error) {
        UI.showError(result.error);
        return;
      }
      updateLocalView();
      checkPhaseTransitions();
      scheduleBotTurnIfNeeded();
      return;
    } else if (isHost) {
      var result = game.placeBet(localPlayerIdx, action, amount);
      if (result && result.error) {
        UI.showError(result.error);
        return;
      }
      broadcastState();
      updateLocalView();
      checkPhaseTransitions();
    } else {
      Network.sendAction(action, amount);
      disableControls();
    }
  }

  function disableControls() {
    els.bettingControls.classList.remove('controls-active');
    els.bettingControls.classList.add('controls-waiting');
    ['btn-fold','btn-check-call','btn-raise','btn-allin'].forEach(function (id) {
      var el = document.getElementById(id);
      if (el) el.disabled = true;
    });
  }

  // ── Showdown / Next Hand / Fold ────────────────────────────────────────
  els.btnNextHand.addEventListener('click', function () {
    if (isHost || soloMode) startNextHand();
  });

  els.btnRestart.addEventListener('click', function () {
    if (isHost || soloMode) {
      game.fullReset();
      game.players[0].name = getLocalName();
      game.players[1].name = soloMode ? 'Bot' : (pendingGuestName || 'Guest');
      game.players[0].chips = game.startingChips;
      game.players[1].chips = game.startingChips;
      startNextHand();
    }
  });

  els.btnNewGame.addEventListener('click', function () {
    if (isHost || soloMode) {
      game.fullReset();
      game.players[0].name = getLocalName();
      game.players[1].name = soloMode ? 'Bot' : (pendingGuestName || 'Guest');
      game.players[0].chips = game.startingChips;
      game.players[1].chips = game.startingChips;
      startNextHand();
    } else {
      UI.showError('Only the host can start a new game');
    }
  });

  function updateCountdownDisplay(sec) {
    var el = document.getElementById('showdown-countdown');
    if (!el) {
      el = document.createElement('div');
      el.id = 'showdown-countdown';
      var overlay = document.getElementById('showdown-overlay');
      if (overlay) overlay.appendChild(el);
    }
    if (sec > 0) {
      el.textContent = 'Next hand in ' + sec + 's';
      el.style.display = 'block';
    } else {
      el.style.display = 'none';
    }
  }

  function startNextHand() {
    clearTimers();
    updateCountdownDisplay(0);
    lastTurnPlayerIdx = -1;
    game.startHand();
    sfxDeal();
    if (!soloMode) broadcastState();
    updateLocalView();
    if (soloMode) scheduleBotTurnIfNeeded();
  }

  function clearTimers() {
    if (nextHandTimer) { clearTimeout(nextHandTimer); nextHandTimer = null; }
    if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
  }

  // Auto-advance: works for both showdown and fold
  function scheduleNextHand(delaySec) {
    if (!isHost) return;
    clearTimers();
    var countdownSec = delaySec;
    updateCountdownDisplay(countdownSec);
    countdownInterval = setInterval(function () {
      countdownSec--;
      updateCountdownDisplay(countdownSec);
      if (countdownSec <= 0) clearInterval(countdownInterval);
    }, 1000);
    nextHandTimer = setTimeout(function () {
      clearTimers();
      updateCountdownDisplay(0);
      startNextHand();
    }, delaySec * 1000);
  }

  // ── Network Message Handler ────────────────────────────────────────────
  function handleNetworkMessage(msg) {
    switch (msg.type) {
      case 'name':
        if (isHost && msg.playerIdx === 1) {
          pendingGuestName = msg.name;
          initGame(getLocalName(), msg.name);
        }
        break;

      case 'start':
        if (!isHost) {
          gameState = msg.state;
          UI.showGame();
          UI.renderTable(gameState, localPlayerIdx);
          els.bettingControls.style.display = 'flex';
          sfxDeal();
          startConnectionMonitor();
          checkTurnNotification(gameState);
        }
        break;

      case 'state':
        if (!isHost) {
          gameState = msg.state;
          UI.renderTable(gameState, localPlayerIdx);
          handlePhaseOnGuest(gameState);
          checkTurnNotification(gameState);
        }
        break;

      case 'error':
        if (!isHost && msg.message) {
          UI.showError(msg.message);
          if (gameState) UI.renderTable(gameState, localPlayerIdx);
        }
        break;

      case 'action':
        if (isHost && msg.action) {
          var result = game.placeBet(1, msg.action, msg.amount || 0);
          if (result && result.error) {
            Network.sendMessage({ type: 'error', message: result.error });
          } else {
            broadcastState();
            updateLocalView();
            checkPhaseTransitions();
          }
        }
        break;
    }
  }

  function handlePhaseOnGuest(state) {
    var phase = state.phase;

    if (phase === 'showdown' || phase === 'fold') {
      els.btnNextHand.style.display = 'none';
      els.btnRestart.style.display = 'none';
      if (state.winner === localPlayerIdx) {
        sfxWin();
      } else if (state.winner >= 0) {
        sfxFold();
      }
      UI.showStatus('Waiting for next hand...');
    } else if (phase === 'gameover') {
      els.btnNextHand.style.display = 'none';
      els.btnRestart.style.display = 'none';
      UI.showStatus('Game over! Host can restart.');
    } else {
      UI.showStatus(state.currentPlayerIdx === localPlayerIdx ? 'Your turn' : "Opponent's turn");
    }
  }

  // ── Game Init ──────────────────────────────────────────────────────────
  function initGame(hostName, guestName) {
    game = new GameEngine();
    game.setPlayerNames(hostName, guestName);
    UI.showGame();
    els.bettingControls.style.display = 'flex';
    els.btnNewGame.style.display = 'inline-flex';
    lastTurnPlayerIdx = -1;
    game.startHand();
    sfxDeal();
    startConnectionMonitor();
    broadcastState(true);
    updateLocalView();
  }

  function broadcastState(isStart) {
    if (!Network.isConnected()) return;
    var stateForGuest = game.getState(1);
    if (isStart) {
      Network.sendStart(stateForGuest);
    } else {
      Network.sendState(stateForGuest);
    }
  }

  function updateLocalView() {
    if (!game) return;
    var state = game.getState(localPlayerIdx);
    UI.renderTable(state, localPlayerIdx);
    checkTurnNotification(state);
    checkPhaseTransitions();
  }

  function checkPhaseTransitions() {
    if (!game) return;
    var phase = game.phase;

    var canControl = isHost || soloMode;

    if (phase === 'showdown') {
      els.btnNextHand.style.display = canControl ? 'inline-flex' : 'none';
      els.btnRestart.style.display = 'none';
      if (canControl && game.winner === 0) sfxWin();
      else if (canControl && game.winner === 1) sfxFold();
      scheduleNextHand(6);

    } else if (phase === 'fold') {
      els.btnNextHand.style.display = canControl ? 'inline-flex' : 'none';
      els.btnRestart.style.display = 'none';
      scheduleNextHand(3);

    } else if (phase === 'gameover') {
      els.btnNextHand.style.display = 'none';
      els.btnRestart.style.display = canControl ? 'inline-flex' : 'none';
      els.btnNewGame.style.display = canControl ? 'inline-flex' : 'none';
      clearTimers();

    } else {
      els.btnNextHand.style.display = 'none';
      els.btnRestart.style.display = 'none';
    }

    if (isHost || soloMode) {
      var isMyTurn = game.currentPlayerIdx === 0;
      var isBettingPhase = phase === 'preflop' || phase === 'flop' || phase === 'turn' || phase === 'river';
      if (isBettingPhase) {
        UI.showStatus(isMyTurn ? 'Your turn' : (soloMode ? 'Bot is thinking...' : "Opponent's turn"));
      }
    }
  }

  function handleDisconnect() {
    UI.showError('Opponent disconnected.');
    if (game && game.phase !== 'lobby' && game.phase !== 'showdown' && game.phase !== 'gameover' && game.phase !== 'fold') {
      if (isHost) {
        game.players[1].folded = true;
        game.endHand(0, 'fold');
        broadcastState();
        updateLocalView();
      }
    }
  }

  function getLocalName() {
    return (els.playerName.value || (isHost ? 'Host' : 'Guest')).trim();
  }

  // ── Bot Turn Logic ─────────────────────────────────────────────────────

  function scheduleBotTurnIfNeeded() {
    if (!soloMode || !game) return;
    if (botTurnTimer) { clearTimeout(botTurnTimer); botTurnTimer = null; }

    var phase = game.phase;
    if (phase === 'showdown' || phase === 'fold' || phase === 'gameover' || phase === 'lobby') return;
    if (game.currentPlayerIdx !== botPlayerIdx) return;

    // Bot "thinks" for 0.8-2.5 seconds
    var delay = 800 + Math.floor(Math.random() * 1700);
    botTurnTimer = setTimeout(function () {
      botTurnTimer = null;
      if (!game || game.currentPlayerIdx !== botPlayerIdx) return;

      var state = game.getState(botPlayerIdx);
      var decision = PokerBot.decide(state, botPlayerIdx);

      var result;
      if (decision.action === 'raise') {
        result = game.placeBet(botPlayerIdx, 'raise', decision.amount);
      } else {
        result = game.placeBet(botPlayerIdx, decision.action);
      }

      if (result && result.error) {
        // Fallback: if raise fails, try call/check, then fold
        result = game.placeBet(botPlayerIdx, 'call');
        if (result && result.error) {
          result = game.placeBet(botPlayerIdx, 'check');
          if (result && result.error) {
            game.placeBet(botPlayerIdx, 'fold');
          }
        }
      }

      updateLocalView();
      checkPhaseTransitions();
      // Recursively schedule if still bot's turn (e.g. after phase advance)
      scheduleBotTurnIfNeeded();
    }, delay);
  }

  // ── Initialize ─────────────────────────────────────────────────────────
  UI.showLobby();

})();
</script>
