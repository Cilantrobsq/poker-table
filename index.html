<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Heads-Up Texas Hold'em</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ─── Error Toast ────────────────────────────────────────────────────────── -->
<div id="error-message"></div>

<!-- ─── Lobby Screen ────────────────────────────────────────────────────────── -->
<div id="lobby-screen" class="screen">
  <div class="lobby-card">
    <div class="lobby-title">Texas Hold'em</div>
    <div class="lobby-subtitle">2-Player Heads-Up Poker</div>

    <div class="lobby-section">
      <h3>Your Name</h3>
      <input type="text" id="player-name" placeholder="Enter your name" maxlength="20" autocomplete="off">
    </div>

    <div class="lobby-section">
      <button class="btn btn-primary" id="btn-host">Host a Game</button>
    </div>

    <div class="lobby-divider">or</div>

    <div class="lobby-section">
      <h3>Join a Game</h3>
      <input type="text" id="room-code-input" placeholder="Enter room code" maxlength="6" autocomplete="off"
             style="text-transform:uppercase; letter-spacing:4px; text-align:center; margin-bottom:10px;">
      <button class="btn btn-secondary" id="btn-join">Join Game</button>
    </div>
  </div>
</div>

<!-- ─── Connecting Screen ───────────────────────────────────────────────────── -->
<div id="connecting-screen" class="screen" style="display:none; flex-direction:column; gap:20px; text-align:center;">
  <div style="font-size:1.1rem; color:rgba(255,255,255,0.7);" id="connecting-message">Waiting for opponent...</div>

  <div id="room-code-wrapper" style="display:none; flex-direction:column; align-items:center; gap:12px;">
    <div style="font-size:0.85rem; color:rgba(255,255,255,0.5);">Share this room code:</div>
    <div class="room-code-display" id="room-code-display">------</div>
    <button class="btn btn-sm btn-secondary" id="btn-copy-code" style="width:auto; padding:8px 20px;">Copy Code</button>
  </div>

  <div class="spinner" style="margin: 0 auto;"></div>

  <button class="btn btn-secondary" id="btn-cancel" style="width:auto; padding:10px 28px; margin:0 auto;">Cancel</button>
</div>

<!-- ─── Game Screen ─────────────────────────────────────────────────────────── -->
<div id="game-screen" class="screen" style="display:none; flex-direction:column;">

  <!-- Header -->
  <div class="game-header">
    <span class="game-header-title">Texas Hold'em</span>
    <div id="status-message"></div>
    <div class="game-header-actions">
      <button class="btn btn-sm btn-secondary" id="btn-new-game" style="display:none;">New Game</button>
      <button class="btn btn-sm btn-danger" id="btn-disconnect">Leave</button>
    </div>
  </div>

  <!-- Table Wrapper -->
  <div class="table-wrapper">
    <div class="poker-table">

      <!-- Opponent (top) -->
      <div class="player-area" id="player-opponent">
        <div class="player-cards" id="opp-cards"></div>
        <div class="player-info">
          <div class="player-name" id="opp-name">Opponent</div>
          <div class="player-chips" id="opp-chips">$1000</div>
          <div class="player-bet" id="opp-bet"></div>
          <div class="player-status" id="opp-status"></div>
        </div>
        <div class="dealer-btn" id="opp-dealer" style="display:none;">D</div>
        <span class="blind-indicator" id="opp-blind"></span>
      </div>

      <!-- Center: Community Cards + Pot -->
      <div class="table-center">
        <div class="phase-label" id="phase-label">Waiting...</div>
        <div class="community-row" id="community-cards"></div>
        <div class="pot-display">
          <span class="pot-label">Pot</span>
          <span id="pot-amount">$0</span>
        </div>
      </div>

      <!-- Local Player (bottom) -->
      <div class="player-area" id="player-local">
        <div class="player-cards" id="local-cards"></div>
        <div class="player-info">
          <div class="player-name" id="local-name">You</div>
          <div class="player-chips" id="local-chips">$1000</div>
          <div class="player-bet" id="local-bet"></div>
          <div class="player-status" id="local-status"></div>
        </div>
        <div class="dealer-btn" id="local-dealer" style="display:none;">D</div>
        <span class="blind-indicator" id="local-blind"></span>
      </div>

      <!-- Showdown Overlay (inside table) -->
      <div id="showdown-overlay">
        <div id="showdown-message"></div>
        <div class="showdown-actions">
          <button class="btn btn-primary" id="btn-next-hand" style="display:none;">Next Hand</button>
          <button class="btn btn-secondary" id="btn-restart" style="display:none;">New Game</button>
        </div>
      </div>

    </div><!-- /.poker-table -->
  </div><!-- /.table-wrapper -->

  <!-- Game Log -->
  <div class="game-log" id="game-log"></div>

  <!-- Betting Controls -->
  <div id="betting-controls" style="display:none;">
    <button class="btn" id="btn-fold">Fold</button>
    <button class="btn" id="btn-check-call" data-action="check">Check</button>
    <div class="raise-controls">
      <input type="range" id="raise-slider" min="20" max="1000" value="40" step="10">
      <input type="number" id="raise-amount" min="20" max="1000" value="40" step="10">
    </div>
    <button class="btn" id="btn-raise">Raise</button>
  </div>

</div><!-- /#game-screen -->

<!-- ─── Scripts ─────────────────────────────────────────────────────────────── -->
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="js/game.js"></script>
<script src="js/ui.js"></script>
<script src="js/peer.js"></script>
<script src="js/main.js"></script>
</body>
</html>
